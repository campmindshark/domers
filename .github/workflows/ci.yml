name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: oven-sh/setup-bun@v2
      - uses: Swatinem/rust-cache@v2
      - name: Full e2e gate
        run: make e2e

  docker-loopback-placeholder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker CI layout
        run: test -f docker/ci/README.md
