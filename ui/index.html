<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Domers Operator</title>
    <style>
      body {
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }
      canvas {
        background: #000;
        border: 1px solid #555;
      }
      output,
      .metric {
        font-variant-numeric: tabular-nums;
      }
      label {
        display: block;
        margin: 0.75rem 0;
      }
    </style>
  </head>
  <body>
    <main data-domers-app>
      <h1>Domers Operator</h1>
      <section aria-label="Engine">
        <button id="start-engine" type="button">Start</button>
        <button id="stop-engine" type="button">Stop</button>
        <span id="engine-status">stopped</span>
        <span id="stream-status">stream disconnected</span>
      </section>
      <section aria-label="Dome Controls">
        <label>
          Dome visualizer
          <select id="dome-active-vis" name="domeActiveVis">
            <option value="0">Volume</option>
            <option value="1">Radial</option>
            <option value="2">Race</option>
            <option value="3">Snakes</option>
            <option value="4">Quaternion Test</option>
            <option value="5">Quaternion Multi Test</option>
            <option value="6">Quaternion Paintbrush</option>
            <option value="7">Splat</option>
          </select>
        </label>
        <label>
          Flash speed
          <input id="flash-speed" name="flashSpeed" type="range" min="0" max="8" step="0.125" value="0" />
          <output id="flash-speed-value" for="flash-speed">0</output>
        </label>
      </section>
      <section aria-label="Metrics">
        <p>Engine frames: <span id="metric-frames" class="metric">0</span></p>
        <p>Simulator frames: <span id="metric-simulator-frames" class="metric">0</span></p>
      </section>
      <section aria-label="Simulator">
        <canvas id="dome-simulator" width="750" height="750" data-frame-source="websocket"></canvas>
      </section>
    </main>
    <script type="module" src="./main.mjs"></script>
  </body>
</html>
