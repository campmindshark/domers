<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindShark Dome Simulator</title>
    <style>
      body {
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
        margin: 1rem;
      }
      canvas {
        aspect-ratio: 1 / 1;
        background: #000;
        border: 1px solid #555;
        box-sizing: border-box;
        display: block;
        height: auto;
        max-width: calc(100vw - 2rem);
        width: 100%;
      }
      .metric {
        font-variant-numeric: tabular-nums;
      }
      label {
        display: block;
        margin: 0.75rem 0;
      }
      fieldset {
        border: 1px solid #444;
        margin: 1rem 0;
        padding: 1rem;
      }
      .swatches {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(auto-fit, minmax(11rem, 1fr));
      }
      a {
        color: #8cc8ff;
      }
    </style>
  </head>
  <body data-page="simulator">
    <main data-domers-simulator>
      <h1>MindShark Dome Simulator</h1>
      <p><a href="/">Back to controls</a></p>
      <section aria-label="Simulator-Only Controls">
        <h2>Simulator-Only Controls</h2>
        <p>These controls affect this simulator page only. They do not patch live runtime config or hardware output.</p>
        <label>
          Dome visualizer
          <select id="sandbox-dome-active-vis" name="sandboxDomeActiveVis">
            <option value="0">Volume</option>
            <option value="1">Radial</option>
            <option value="2">Race</option>
            <option value="3">Snakes</option>
            <option value="4">Quaternion Test</option>
            <option value="5">Quaternion Multi Test</option>
            <option value="6">Quaternion Paintbrush</option>
            <option value="7">Splat</option>
          </select>
        </label>
        <label>
          Audio volume preview
          <input id="sandbox-volume" name="sandboxVolume" type="range" min="0" max="1" step="0.01" value="0.7" />
          <output id="sandbox-volume-value" for="sandbox-volume">0.7</output>
        </label>
        <label>
          Beat phase preview
          <input id="sandbox-beat-progress" name="sandboxBeatProgress" type="range" min="0" max="1" step="0.01" value="0.25" />
          <output id="sandbox-beat-progress-value" for="sandbox-beat-progress">0.25</output>
        </label>
        <label>
          <input id="sandbox-flash-active" name="sandboxFlashActive" type="checkbox" checked />
          Flash overlay active preview
        </label>
        <fieldset>
          <legend>Simulator palette colors</legend>
          <div class="swatches">
            <label>
              Color 1
              <input id="sandbox-palette-primary" name="sandboxPalettePrimary" type="color" value="#00ff00" />
            </label>
            <label>
              Color 2
              <input id="sandbox-palette-secondary" name="sandboxPaletteSecondary" type="color" value="#0080ff" />
            </label>
            <label>
              Color 3 / flash
              <input id="sandbox-palette-accent" name="sandboxPaletteAccent" type="color" value="#ff4080" />
            </label>
          </div>
        </fieldset>
      </section>
      <section aria-label="Metrics">
        <span id="stream-status">simulator sandbox</span>
        <p>Engine frames: <span id="metric-frames" class="metric">0</span></p>
        <p>Simulator frames: <span id="metric-simulator-frames" class="metric">0</span></p>
      </section>
      <section aria-label="Simulator">
        <canvas id="dome-simulator" width="750" height="750" data-frame-source="websocket"></canvas>
      </section>
    </main>
    <script type="module" src="./main.mjs"></script>
  </body>
</html>
